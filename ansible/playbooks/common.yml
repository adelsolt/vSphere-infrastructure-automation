---
- name: Common baseline configuration
  hosts: all_vms
  become: true
  gather_facts: true

  vars_files:
    - ../group_vars/vault.yml

  tasks:
    - name: Pull ansible secrets from Vault
      ansible.builtin.uri:
        url: "https://vault.rscc.com:8200/v1/secret/data/ansible"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_token }}"
        return_content: true
      register: vault_response
      no_log: true

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Update dnf cache
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_os_family == "RedHat"

    - name: Install common packages (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - curl
          - git
          - htop
          - vim
          - wget
          - unzip
          - python3
          - python3-pip
        state: present
      when: ansible_os_family == "Debian"

    - name: Install common packages (RHEL/CentOS)
      ansible.builtin.dnf:
        name:
          - curl
          - git
          - htop
          - vim-enhanced
          - wget
          - unzip
          - python3
          - python3-pip
        state: present
      when: ansible_os_family == "RedHat"

    - name: Set timezone to UTC
      community.general.timezone:
        name: UTC

    - name: Ensure sshd is running and enabled
      ansible.builtin.systemd:
        name: sshd
        state: started
        enabled: true

    - name: Harden sshd_config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^#?PermitRootLogin',        line: 'PermitRootLogin no' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?X11Forwarding',          line: 'X11Forwarding no' }
      notify: Restart sshd

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

  handlers:
    - name: Restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted
