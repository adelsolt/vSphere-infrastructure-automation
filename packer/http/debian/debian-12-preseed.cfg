# ============================================================
# Preseed file for Debian 12 (Bookworm) — automated install
#
# The debian-installer reads this file over HTTP during boot.
# Packer serves it automatically via its built-in HTTP server —
# that's what the {{.HTTPIP}}:{{.HTTPPort}} in the boot command is.
#
# Each d-i line is answering a debconf question that the installer
# would normally ask a human. "d-i" stands for debian-installer.
# ============================================================

### Locale and keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i console-setup/ask_detect boolean false

### Network — let DHCP sort it out during install
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string debian12
d-i netcfg/get_domain string rscc.internal
d-i netcfg/disable_autoconfig boolean false

### Debian mirror — bookworm repo (not bullseye, not buster)
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Clock and timezone
d-i clock-setup/utc boolean true
d-i time/zone string UTC

### Partitioning — simple atomic layout (one big root partition)
# "regular" means no LVM/RAID. Good enough for a template.
# The template disk gets resized by Terraform/vCenter customization later anyway.
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### User accounts
# root gets locked — access is via the packer user (sudo)
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Packer Build User
d-i passwd/username string packer
# password hash for "packer" — obviously change for real use
d-i passwd/user-password-crypted password $6$rounds=656000$saltgoeshere$hashedpassword
d-i passwd/user-default-groups string sudo

### Package selection — minimal, no desktop
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string \
    curl \
    git \
    htop \
    open-vm-tools \
    python3 \
    sudo \
    vim

d-i pkgsel/upgrade select full-upgrade

### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

### Finish
d-i finish-install/reboot_in_progress note

### Run a late command to allow passwordless sudo for packer user
# (packer needs this to run the provisioner script)
d-i preseed/late_command string \
    in-target sh -c 'echo "packer ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers.d/packer && chmod 440 /etc/sudoers.d/packer'
