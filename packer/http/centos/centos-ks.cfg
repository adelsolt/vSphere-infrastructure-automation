# ============================================================
# Kickstart file for CentOS Stream 9 — automated install
#
# The Red Hat family uses kickstart instead of preseed.
# Functionally the same idea — answers installer questions automatically.
# The "inst.ks=" kernel param in the boot command tells the installer
# where to find this file (served by packer's HTTP server).
# ============================================================

# use text mode (no GUI installer)
text
reboot

### Locale and keyboard
lang en_US.UTF-8
keyboard us
timezone UTC --utc

### Network
network --bootproto=dhcp --onboot=on --activate

### Security
rootpw --lock
user --name=packer --password=packer --plaintext --groups=wheel

### Disk
zerombr
clearpart --all --initlabel
autopart --type=plain

### Bootloader
bootloader --location=mbr

### Packages
%packages --ignoremissing
@^minimal-environment
curl
git
python3
vim-enhanced
open-vm-tools
sudo
%end

### Post-install
%post
echo "packer ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/packer
chmod 440 /etc/sudoers.d/packer
systemctl enable vmtoolsd
%end
